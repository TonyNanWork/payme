<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pay Me</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* Animated starfield background */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--d) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.1; transform: scale(0.8); }
      to   { opacity: 0.9; transform: scale(1.2); }
    }

    /* Ambient glow blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: drift var(--d) ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(var(--tx), var(--ty)) scale(1.15); }
    }

    /* Scene wrapper */
    .scene {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Orbiting rings */
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1.5px solid transparent;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .scene:hover .ring { opacity: 1; }

    .ring-1 {
      width: 260px; height: 260px;
      border-color: rgba(139, 92, 246, 0.5);
      animation: spin 3s linear infinite;
      box-shadow: 0 0 12px rgba(139, 92, 246, 0.4);
    }
    .ring-2 {
      width: 320px; height: 320px;
      border-color: rgba(236, 72, 153, 0.4);
      animation: spin 5s linear infinite reverse;
      box-shadow: 0 0 12px rgba(236, 72, 153, 0.3);
    }
    .ring-3 {
      width: 390px; height: 390px;
      border-color: rgba(59, 130, 246, 0.3);
      animation: spin 8s linear infinite;
      box-shadow: 0 0 12px rgba(59, 130, 246, 0.2);
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* Orbiting dots */
    .dot {
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .scene:hover .dot { opacity: 1; }
    .dot-1 {
      background: #a78bfa;
      box-shadow: 0 0 10px #a78bfa, 0 0 20px #a78bfa;
      animation: orbit1 3s linear infinite;
    }
    .dot-2 {
      background: #f472b6;
      box-shadow: 0 0 10px #f472b6, 0 0 20px #f472b6;
      animation: orbit2 5s linear infinite reverse;
    }
    .dot-3 {
      background: #60a5fa;
      box-shadow: 0 0 10px #60a5fa, 0 0 20px #60a5fa;
      animation: orbit3 8s linear infinite;
    }
    @keyframes orbit1 {
      from { transform: rotate(0deg)   translateX(130px) rotate(0deg); }
      to   { transform: rotate(360deg) translateX(130px) rotate(-360deg); }
    }
    @keyframes orbit2 {
      from { transform: rotate(120deg)  translateX(160px) rotate(-120deg); }
      to   { transform: rotate(480deg)  translateX(160px) rotate(-480deg); }
    }
    @keyframes orbit3 {
      from { transform: rotate(240deg)  translateX(195px) rotate(-240deg); }
      to   { transform: rotate(600deg)  translateX(195px) rotate(-600deg); }
    }

    /* THE BUTTON */
    .pay-btn {
      position: relative;
      padding: 22px 56px;
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
      background: linear-gradient(135deg, #6d28d9, #ec4899, #3b82f6);
      background-size: 300% 300%;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      outline: none;
      animation: gradientShift 4s ease infinite, idlePulse 2.5s ease-in-out infinite;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      z-index: 2;
      user-select: none;
      -webkit-user-select: none;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes idlePulse {
      0%, 100% { box-shadow: 0 0 20px rgba(139,92,246,0.4), 0 0 40px rgba(236,72,153,0.2); }
      50%       { box-shadow: 0 0 40px rgba(139,92,246,0.7), 0 0 80px rgba(236,72,153,0.4); }
    }

    /* Sheen layer */
    .pay-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.25) 50%, transparent 70%);
      background-size: 200% 200%;
      background-position: -200% center;
      transition: background-position 0s;
      pointer-events: none;
    }

    /* Glitch pseudo layers */
    .pay-btn::after {
      content: 'PAY ME';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ff00ff;
      mix-blend-mode: screen;
      opacity: 0;
      pointer-events: none;
      border-radius: 16px;
      clip-path: inset(0);
    }

    /* ===== HOVER STATE ===== */
    .pay-btn:hover {
      animation: gradientShift 1.5s ease infinite, shake 0.15s ease-in-out infinite;
      transform: scale(1.08);
      box-shadow:
        0 0 30px rgba(139,92,246,0.9),
        0 0 60px rgba(236,72,153,0.7),
        0 0 100px rgba(59,130,246,0.5),
        0 8px 40px rgba(0,0,0,0.5);
    }
    .pay-btn:hover::before {
      animation: sheen 0.6s ease forwards;
    }
    .pay-btn:hover::after {
      animation: glitch 0.3s steps(2) infinite;
    }

    @keyframes shake {
      0%, 100% { transform: scale(1.08) translateX(0); }
      25%       { transform: scale(1.08) translateX(-2px) rotate(-0.5deg); }
      75%       { transform: scale(1.08) translateX(2px)  rotate(0.5deg); }
    }
    @keyframes sheen {
      from { background-position: -200% center; }
      to   { background-position: 200% center; }
    }
    @keyframes glitch {
      0%  { opacity: 0.4; clip-path: inset(20% 0 60% 0); transform: translateX(-3px); }
      25% { opacity: 0;   clip-path: inset(80% 0 5%  0); transform: translateX(3px);  }
      50% { opacity: 0.3; clip-path: inset(40% 0 40% 0); transform: translateX(-2px); }
      75% { opacity: 0;                                                                }
    }

    /* Active/click */
    .pay-btn:active {
      transform: scale(0.96);
      animation: gradientShift 1.5s ease infinite;
      box-shadow: 0 0 15px rgba(139,92,246,0.5);
    }

    /* Ripple canvas */
    #ripple-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* Particle canvas */
    #particle-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 3;
    }

    /* Money emoji burst */
    .money-burst {
      position: fixed;
      font-size: 2rem;
      pointer-events: none;
      z-index: 20;
      animation: moneyFly var(--dur) ease-out forwards;
    }
    @keyframes moneyFly {
      0%   { transform: translate(0,0) scale(0.5) rotate(0deg); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(1.4) rotate(var(--r)); opacity: 0; }
    }

    /* Hover text hints */
    .hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.25);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      pointer-events: none;
    }
  </style>
</head>
<body>

<canvas id="particle-canvas"></canvas>
<canvas id="ripple-canvas"></canvas>

<div class="stars" id="stars"></div>

<!-- Ambient blobs -->
<div class="blob" style="width:500px;height:500px;background:#6d28d9;top:-100px;left:-100px;--d:7s;--tx:40px;--ty:30px;"></div>
<div class="blob" style="width:400px;height:400px;background:#ec4899;bottom:-80px;right:-80px;--d:9s;--tx:-50px;--ty:-40px;"></div>
<div class="blob" style="width:300px;height:300px;background:#3b82f6;top:50%;left:50%;--d:11s;--tx:60px;--ty:-60px;"></div>

<div class="scene" id="scene">
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>
  <div class="dot dot-1"></div>
  <div class="dot dot-2"></div>
  <div class="dot dot-3"></div>

  <!-- REPLACE THE HREF WITH YOUR STRIPE PAYMENT LINK -->
  <a href="https://buy.stripe.com/8x28wO5PP8XveIE7f26oo00" id="pay-link" style="text-decoration:none;">
    <button class="pay-btn" id="payBtn">PAY ME</button>
  </a>
</div>

<p class="hint">hover me &nbsp;·&nbsp; click to pay $20/mo</p>

<script>
// ── Starfield ──────────────────────────────────────────────
const starsEl = document.getElementById('stars');
for (let i = 0; i < 160; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.5 + 0.5;
  s.style.cssText = `
    width:${size}px;height:${size}px;
    top:${Math.random()*100}%;left:${Math.random()*100}%;
    --d:${(Math.random()*3+1.5).toFixed(1)}s;
  `;
  starsEl.appendChild(s);
}

// ── Particle system (hover) ────────────────────────────────
const pCanvas = document.getElementById('particle-canvas');
const pCtx    = pCanvas.getContext('2d');
let particles = [];
let hovering  = false;
const btn = document.getElementById('payBtn');

function resizeCanvases() {
  pCanvas.width = rCanvas.width = window.innerWidth;
  pCanvas.height = rCanvas.height = window.innerHeight;
}
const rCanvas = document.getElementById('ripple-canvas');
const rCtx    = rCanvas.getContext('2d');
resizeCanvases();
window.addEventListener('resize', resizeCanvases);

const COLORS = ['#a78bfa','#f472b6','#60a5fa','#fbbf24','#34d399','#fb7185'];

function spawnParticle(x, y) {
  const angle = Math.random() * Math.PI * 2;
  const speed = Math.random() * 3 + 1;
  particles.push({
    x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed - Math.random() * 1.5,
    life: 1,
    decay: Math.random() * 0.02 + 0.01,
    size: Math.random() * 4 + 1,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
  });
}

let ripples = [];
function spawnRipple(x, y) {
  ripples.push({ x, y, r: 0, maxR: Math.max(window.innerWidth, window.innerHeight) * 1.2, life: 1 });
}

function loop() {
  requestAnimationFrame(loop);

  // Particles
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  if (hovering) {
    const r = btn.getBoundingClientRect();
    const cx = r.left + r.width / 2;
    const cy = r.top + r.height / 2;
    for (let i = 0; i < 4; i++) {
      const angle = Math.random() * Math.PI * 2;
      const radius = (r.width / 2 + r.height / 2) / 2 + Math.random() * 10;
      spawnParticle(cx + Math.cos(angle) * radius, cy + Math.sin(angle) * radius);
    }
  }
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.05;
    p.life -= p.decay;
    pCtx.globalAlpha = p.life;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.shadowColor = p.color;
    pCtx.shadowBlur = 8;
    pCtx.fill();
  }
  pCtx.globalAlpha = 1;
  pCtx.shadowBlur = 0;

  // Ripples
  rCtx.clearRect(0, 0, rCanvas.width, rCanvas.height);
  ripples = ripples.filter(r => r.life > 0);
  for (const r of ripples) {
    r.r += 28;
    r.life -= 0.025;
    const gradient = rCtx.createRadialGradient(r.x, r.y, r.r * 0.6, r.x, r.y, r.r);
    gradient.addColorStop(0, `rgba(167,139,250,0)`);
    gradient.addColorStop(0.5, `rgba(236,72,153,${r.life * 0.25})`);
    gradient.addColorStop(1, `rgba(59,130,246,0)`);
    rCtx.beginPath();
    rCtx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
    rCtx.fillStyle = gradient;
    rCtx.fill();
  }
}
loop();

// ── Hover events ───────────────────────────────────────────
btn.addEventListener('mouseenter', () => { hovering = true; });
btn.addEventListener('mouseleave', () => { hovering = false; });

// ── Click: money burst + ripple ────────────────────────────
btn.addEventListener('click', (e) => {
  const cx = e.clientX, cy = e.clientY;
  spawnRipple(cx, cy);

  const emojis = ['💸','💰','🤑','💵','✨','🔥','💎','🎉'];
  for (let i = 0; i < 14; i++) {
    const el = document.createElement('div');
    el.className = 'money-burst';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    const angle = (Math.PI * 2 / 14) * i + Math.random() * 0.4;
    const dist  = 120 + Math.random() * 160;
    el.style.cssText = `
      left:${cx}px; top:${cy}px;
      --tx:${Math.cos(angle)*dist}px;
      --ty:${Math.sin(angle)*dist - 60}px;
      --r:${(Math.random()-0.5)*60}deg;
      --dur:${(Math.random()*0.4+0.6).toFixed(2)}s;
    `;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
});

// ── Mouse parallax on scene ────────────────────────────────
const scene = document.getElementById('scene');
document.addEventListener('mousemove', (e) => {
  if (!hovering) return;
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  const dx = (e.clientX - cx) / cx;
  const dy = (e.clientY - cy) / cy;
  scene.style.transform = `perspective(800px) rotateY(${dx*8}deg) rotateX(${-dy*8}deg)`;
});
document.addEventListener('mouseleave', () => {
  scene.style.transform = '';
});
btn.addEventListener('mouseleave', () => {
  scene.style.transform = '';
});
</script>
</body>
</html>
